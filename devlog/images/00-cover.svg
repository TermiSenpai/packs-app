      <text x="222" y="26" fill="#A6B0C2" font-size="14" font-weight="500">Electron · vanilla JS</text>
      <rect x="380" width="120" height="40" rx="20" fill="#1A2740" stroke="#5A6478" stroke-width="1"/>
      <text x="402" y="26" fill="#A6B0C2" font-size="14" font-weight="500">2026 · Beta</text>
