    <text x="80" y="36" fill="#FFFFFF" font-size="22" font-weight="600" letter-spacing="0.5">PackPrice</text>
    <text x="0" y="120" fill="#FFFFFF" font-size="64" font-weight="700" letter-spacing="-1">Devlog · de Excel a una</text>
