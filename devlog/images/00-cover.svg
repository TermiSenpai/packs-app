      <stop offset="0" stop-color="#0F1A2B"/>
      <stop offset="1" stop-color="#1A2740"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#3D7BD9" stop-opacity="0.35"/>
