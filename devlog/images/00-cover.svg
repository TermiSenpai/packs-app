    <text x="0" y="245" fill="#A6B0C2" font-size="22" font-weight="400">La crónica completa de cómo se diseñó y se construyó</text>
    <text x="0" y="278" fill="#A6B0C2" font-size="22" font-weight="400">una calculadora interna para un taller DTF.</text>
    <g transform="translate(0,330)">
