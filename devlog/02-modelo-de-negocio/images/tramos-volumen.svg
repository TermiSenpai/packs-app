<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system, Segoe UI, Inter, sans-serif">
  <rect width="1200" height="480" fill="#FFFFFF"/>
  <g transform="translate(80,60)">
    <text fill="#0F1A2B" font-size="28" font-weight="700">Tramos por volumen.</text>
    <text y="32" fill="#5A6478" font-size="15">A más unidades, menos minutos por prenda y más PVP barato. La mecánica entera del descuento.</text>
  </g>
  <g transform="translate(80,160)" font-family="ui-monospace, Consolas, monospace">
    <g transform="translate(0,0)">
      <rect width="240" height="220" rx="14" fill="#F1F4F8"/>
      <text x="20" y="30" fill="#5A6478" font-size="11" font-weight="700" letter-spacing="1.5">TRAMO T1</text>
      <text x="20" y="74" fill="#0F1A2B" font-size="32" font-weight="700">10–24</text>
      <text x="20" y="98" fill="#5A6478" font-size="13" font-family="-apple-system, Segoe UI, Inter, sans-serif">Pedido pequeño</text>
      <line x1="20" x2="220" y1="120" y2="120" stroke="#E4E9F2"/>
      <text x="20" y="150" fill="#5A6478" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">Reducción de tiempo</text>
      <text x="220" y="150" fill="#0F1A2B" font-size="14" font-weight="700" text-anchor="end">0 %</text>
      <text x="20" y="180" fill="#5A6478" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">PVP pack peña 2c</text>
      <text x="220" y="180" fill="#0F1A2B" font-size="14" font-weight="700" text-anchor="end">25,95 €</text>
    </g>
    <g transform="translate(260,0)">
      <rect width="240" height="220" rx="14" fill="#E4EEFC"/>
      <text x="20" y="30" fill="#1F4FA3" font-size="11" font-weight="700" letter-spacing="1.5">TRAMO T2</text>
      <text x="20" y="74" fill="#0F1A2B" font-size="32" font-weight="700">25–49</text>
      <text x="20" y="98" fill="#5A6478" font-size="13" font-family="-apple-system, Segoe UI, Inter, sans-serif">Pedido medio</text>
      <line x1="20" x2="220" y1="120" y2="120" stroke="#CDD5E2"/>
      <text x="20" y="150" fill="#5A6478" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">Reducción de tiempo</text>
      <text x="220" y="150" fill="#1FA86A" font-size="14" font-weight="700" text-anchor="end">−10 %</text>
      <text x="20" y="180" fill="#5A6478" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">PVP pack peña 2c</text>
      <text x="220" y="180" fill="#0F1A2B" font-size="14" font-weight="700" text-anchor="end">24,95 €</text>
    </g>
    <g transform="translate(520,0)">
      <rect width="240" height="220" rx="14" fill="#3D7BD9"/>
      <text x="20" y="30" fill="#A6B0C2" font-size="11" font-weight="700" letter-spacing="1.5">TRAMO T3</text>
      <text x="20" y="74" fill="#FFFFFF" font-size="32" font-weight="700">50–99</text>
      <text x="20" y="98" fill="#A6B0C2" font-size="13" font-family="-apple-system, Segoe UI, Inter, sans-serif">Pedido grande</text>
      <line x1="20" x2="220" y1="120" y2="120" stroke="#2E63B8"/>
      <text x="20" y="150" fill="#A6B0C2" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">Reducción de tiempo</text>
      <text x="220" y="150" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="end">−15 %</text>
      <text x="20" y="180" fill="#A6B0C2" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">PVP pack peña 2c</text>
      <text x="220" y="180" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="end">23,95 €</text>
    </g>
    <g transform="translate(780,0)">
      <rect width="240" height="220" rx="14" fill="#0F1A2B"/>
      <text x="20" y="30" fill="#A6B0C2" font-size="11" font-weight="700" letter-spacing="1.5">TRAMO T4</text>
      <text x="20" y="74" fill="#FFFFFF" font-size="32" font-weight="700">100+</text>
      <text x="20" y="98" fill="#A6B0C2" font-size="13" font-family="-apple-system, Segoe UI, Inter, sans-serif">Pedido muy grande</text>
