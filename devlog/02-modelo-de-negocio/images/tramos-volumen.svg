      <text x="20" y="150" fill="#A6B0C2" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">Reducción de tiempo</text>
      <text x="220" y="150" fill="#1FA86A" font-size="14" font-weight="700" text-anchor="end">−20 %</text>
      <text x="20" y="180" fill="#A6B0C2" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">PVP pack peña 2c</text>
