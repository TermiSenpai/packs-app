      <text x="24" y="78" fill="#5A6478" font-size="14">Cuerpo 14, line-height 1.5. Sans humanista, perfecta a baja resolución.</text>
      <text x="24" y="106" fill="#5A6478" font-size="13" font-style="italic">"PackPrice — calculadora de packs DTF"</text>
    </g>
    <g transform="translate(520,60)">
