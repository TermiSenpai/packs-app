      <text x="24" y="40" fill="#FFFFFF" font-size="32" font-weight="700" font-family="ui-monospace, Consolas, monospace">311,40 €</text>
      <text x="24" y="78" fill="#A6B0C2" font-size="14">Geist Mono para precios, IVA y totales.</text>
      <text x="24" y="106" fill="#A6B0C2" font-size="13" font-family="ui-monospace, Consolas, monospace">12 packs · 25,95 € · −15%</text>
