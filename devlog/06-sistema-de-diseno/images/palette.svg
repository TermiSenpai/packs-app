<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, Segoe UI, Inter, sans-serif">
  <rect width="1200" height="720" fill="#FFFFFF"/>
  <g transform="translate(80,60)">
    <text fill="#5A6478" font-size="13" font-weight="700" letter-spacing="2">CAPÍTULO 06 · SISTEMA DE DISEÑO</text>
    <text y="50" fill="#0F1A2B" font-size="32" font-weight="700">Paleta gris azulada, modo claro.</text>
    <text y="84" fill="#5A6478" font-size="16">Once tokens cubren toda la app. Lo demás se compone con ellos.</text>
  </g>
  <g transform="translate(80,200)" font-family="ui-monospace, Consolas, monospace" font-size="12">
    <g transform="translate(0,0)">
      <rect width="240" height="120" rx="14" fill="#0F1A2B"/>
      <text x="20" y="36" fill="#FFFFFF" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, Inter, sans-serif">surface-inverse</text>
      <text x="20" y="58" fill="#A6B0C2">#0F1A2B</text>
      <text x="20" y="100" fill="#A6B0C2" font-family="-apple-system, Segoe UI, Inter, sans-serif">Hero · precio en vivo</text>
    </g>
    <g transform="translate(260,0)">
      <rect width="240" height="120" rx="14" fill="#3D7BD9"/>
      <text x="20" y="36" fill="#FFFFFF" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, Inter, sans-serif">accent-primary</text>
      <text x="20" y="58" fill="#FFFFFF" opacity="0.8">#3D7BD9</text>
      <text x="20" y="100" fill="#FFFFFF" opacity="0.8" font-family="-apple-system, Segoe UI, Inter, sans-serif">Botones · enlaces · foco</text>
    </g>
    <g transform="translate(520,0)">
