      <text x="20" y="100" fill="#1F4FA3" font-family="-apple-system, Segoe UI, Inter, sans-serif">Badges · hints informativos</text>
    </g>
    <g transform="translate(780,0)">
      <rect width="240" height="120" rx="14" fill="#FFFFFF" stroke="#E4E9F2"/>
      <text x="20" y="36" fill="#0F1A2B" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, Inter, sans-serif">surface-secondary</text>
      <text x="20" y="58" fill="#5A6478">#FFFFFF</text>
      <text x="20" y="100" fill="#5A6478" font-family="-apple-system, Segoe UI, Inter, sans-serif">Tarjetas · modales · campos</text>
    </g>
    <g transform="translate(0,140)">
      <rect width="240" height="120" rx="14" fill="#F1F4F8"/>
      <text x="20" y="36" fill="#0F1A2B" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, Inter, sans-serif">surface-primary</text>
      <text x="20" y="58" fill="#5A6478">#F1F4F8</text>
      <text x="20" y="100" fill="#5A6478" font-family="-apple-system, Segoe UI, Inter, sans-serif">Fondo de página</text>
    </g>
    <g transform="translate(260,140)">
      <rect width="240" height="120" rx="14" fill="#1FA86A"/>
      <text x="20" y="36" fill="#FFFFFF" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, Inter, sans-serif">success</text>
      <text x="20" y="58" fill="#FFFFFF" opacity="0.85">#1FA86A</text>
      <text x="20" y="100" fill="#FFFFFF" opacity="0.85" font-family="-apple-system, Segoe UI, Inter, sans-serif">Margen · NAS conectado</text>
    </g>
    <g transform="translate(520,140)">
