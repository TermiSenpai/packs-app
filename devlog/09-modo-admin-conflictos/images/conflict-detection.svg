      <text x="20" y="32" fill="#FFFFFF" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, Inter, sans-serif">A1B2C3 ≠ D4E5F6</text>
      <text x="20" y="58" fill="#D24D4D" font-size="12" font-family="-apple-system, Segoe UI, Inter, sans-serif">¡Conflicto detectado!</text>
    </g>
