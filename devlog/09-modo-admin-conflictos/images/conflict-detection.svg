  <g transform="translate(80,580)">
    <rect width="1040" height="140" rx="16" fill="#FFFFFF" stroke="#E4E9F2"/>
    <g transform="translate(28,28)">
      <rect width="48" height="48" rx="10" fill="#FBEFD9"/>
      <text x="14" y="32" fill="#D98A1F" font-size="22">⚠</text>
    </g>
    <text x="92" y="44" fill="#0F1A2B" font-size="16" font-weight="700">Diálogo nativo Windows</text>
    <text x="92" y="68" fill="#5A6478" font-size="13">«El archivo fue modificado por Fede mientras editabas. ¿Qué hacer?»</text>
    <g transform="translate(92,90)">
      <rect width="160" height="36" rx="10" fill="#3D7BD9"/>
      <text x="22" y="24" fill="#FFFFFF" font-size="13" font-weight="700">Sobrescribir</text>
    </g>
    <g transform="translate(266,90)">
      <rect width="180" height="36" rx="10" fill="#FFFFFF" stroke="#CDD5E2"/>
      <text x="22" y="24" fill="#0F1A2B" font-size="13" font-weight="600">Descartar mis cambios</text>
    </g>
    <g transform="translate(458,90)">
      <rect width="120" height="36" rx="10" fill="#F1F4F8"/>
      <text x="36" y="24" fill="#5A6478" font-size="13" font-weight="600">Cancelar</text>
    </g>
    <text x="592" y="112" fill="#5A6478" font-size="12">El backup se crea siempre. Decisión es reversible.</text>
  </g>
</svg>
